<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arunodaya Cafe | Cinematic Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@200;300;400;500&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <style>
        :root {
            --amber: #F59E0B;
            --amber-light: #FCD34D;
            --amber-dark: #B45309;
            --copper: #C2410C;
            --cream: #FEF9F0;
            --cream2: rgba(254,249,240,0.85);
            --cream3: rgba(254,249,240,0.4);
            --cream4: rgba(254,249,240,0.15);
            --dark: #0A0500;
            --dark2: #110800;
            --glass: rgba(10,5,0,0.45);
            --fh: 'Playfair Display', serif;
            --fb: 'Inter', sans-serif;
            --fs: 'Dancing Script', cursive;
            --ease: cubic-bezier(0.16,1,0.3,1);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        html, body {
            width:100%; height:100%;
            overflow:hidden;
            background:var(--dark);
            color:var(--cream);
            font-family:var(--fb);
            touch-action:none;
        }

        /* ── Cursor Glow ──────────────────────── */
        .cursor-glow {
            position:fixed; pointer-events:none;
            width:350px; height:350px;
            border-radius:50%;
            background:radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
            transform:translate(-50%,-50%);
            z-index:9998;
            transition:transform 0.08s linear;
        }
        .ripple-dot {
            position:fixed; pointer-events:none; border-radius:50%;
            border:1.5px solid rgba(245,158,11,0.6);
            transform:translate(-50%,-50%) scale(0);
            animation:ripOut 0.9s ease-out forwards;
            z-index:9999;
        }
        @keyframes ripOut { to { transform:translate(-50%,-50%) scale(4); opacity:0; } }

        /* ── Animations ───────────────────────── */
        @keyframes fadeUp   { from{opacity:0;transform:translateY(30px) blur(8px)} to{opacity:1;transform:translateY(0) blur(0)} }
        @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
        @keyframes liquidFill { from{clip-path:inset(100% 0 0 0)} to{clip-path:inset(0% 0 0 0)} }
        @keyframes shimmer  { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        @keyframes steamUp  { 0%{transform:translateY(0) scaleX(1);opacity:0} 20%{opacity:.7} 100%{transform:translateY(-130px) scaleX(1.6) skewX(10deg);opacity:0} }
        @keyframes grain    { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-1px,1px)} 66%{transform:translate(1px,-1px)} }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 33%{transform:translate(20px,-15px)} 66%{transform:translate(-10px,20px)} }
        @keyframes glowBeat { 0%,100%{text-shadow:0 0 40px rgba(245,158,11,.5),0 0 80px rgba(245,158,11,.2)} 50%{text-shadow:0 0 80px rgba(245,158,11,.9),0 0 150px rgba(245,158,11,.4)} }
        @keyframes lineGrow { from{width:0} to{width:80px} }
        @keyframes badgePulse { 0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.3)} 50%{box-shadow:0 0 0 8px rgba(245,158,11,0)} }

        /* ── Particle Container ───────────────── */
        #particles { position:absolute; inset:0; z-index:1; }

        /* ── Ambient Orbs ─────────────────────── */
        .orbs { position:absolute; inset:0; z-index:2; pointer-events:none; overflow:hidden; }
        .orb  {
            position:absolute; border-radius:50%;
            filter:blur(80px); animation:orbFloat 12s ease-in-out infinite;
        }
        .orb-1 { width:400px;height:400px; background:rgba(180,83,9,.12); top:-10%;left:-10%; animation-delay:0s; }
        .orb-2 { width:300px;height:300px; background:rgba(245,158,11,.07); top:30%;right:-5%; animation-delay:4s; }
        .orb-3 { width:250px;height:250px; background:rgba(194,65,12,.08); bottom:10%;left:20%; animation-delay:8s; }

        /* ── Video & Overlays ─────────────────── */
        .bg-video {
            position:absolute; inset:0; width:100%; height:100%;
            object-fit:cover; z-index:3;
            transform:scale(1.12); filter:brightness(.35) saturate(1.3);
            animation:vidPan 22s ease-out forwards;
        }
        @keyframes vidPan { from{transform:scale(1.12)} to{transform:scale(1.02)} }

        .overlay-gradient {
            position:absolute; inset:0; z-index:4; pointer-events:none;
            background:
                radial-gradient(ellipse 70% 50% at 50% 100%, rgba(180,83,9,.35) 0%, transparent 60%),
                radial-gradient(circle at 50% 40%, transparent 20%, rgba(0,0,0,.65) 100%),
                linear-gradient(to bottom, rgba(10,5,0,.85) 0%, transparent 25%, transparent 60%, rgba(10,5,0,.98) 100%);
        }
        .grain {
            position:absolute; inset:0; z-index:5; pointer-events:none; opacity:.032;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size:200px; animation:grain .35s steps(2) infinite;
        }

        /* ── Steam ────────────────────────────── */
        .steam-wrap { position:absolute; bottom:36%; left:50%; transform:translateX(-50%); z-index:5; pointer-events:none; display:flex; gap:20px; }
        .steam { width:2px; border-radius:99px; opacity:0; animation:steamUp 3.5s ease-in-out infinite;
            background:linear-gradient(to top,transparent,rgba(255,255,255,.3),transparent); }
        .steam:nth-child(1) { height:55px; animation-delay:.0s; }
        .steam:nth-child(2) { height:75px; animation-delay:.8s; }
        .steam:nth-child(3) { height:60px; animation-delay:1.6s; }
        .steam:nth-child(4) { height:45px; animation-delay:2.4s; }

        /* ── Header ───────────────────────────── */
        .intro-header {
            position:absolute; top:0; left:0; right:0; z-index:10;
            display:flex; justify-content:space-between; align-items:center;
            padding:20px 28px;
            opacity:0; animation:fadeUp 1.4s var(--ease) 2.6s forwards;
        }
        .clock {
            font-size:10px; letter-spacing:4px; text-transform:uppercase;
            color:rgba(245,158,11,.5); font-weight:300;
        }
        .skip-btn {
            background:rgba(255,255,255,.05); backdrop-filter:blur(16px);
            border:1px solid rgba(254,249,240,.12); color:rgba(254,249,240,.45);
            font-family:var(--fb); font-size:9px; letter-spacing:4px;
            text-transform:uppercase; padding:9px 22px; border-radius:30px;
            cursor:pointer; transition:all .35s;
        }
        .skip-btn:hover { background:rgba(245,158,11,.12); border-color:rgba(245,158,11,.4); color:var(--amber); }

        /* ── Hero ─────────────────────────────── */
        .hero {
            position:absolute; inset:0; z-index:8;
            display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
            padding-bottom:clamp(100px,18vh,160px);
            text-align:center;
        }

        .hero-eyebrow {
            font-family:var(--fs); font-size:clamp(1rem,3.5vw,1.4rem);
            color:var(--amber); letter-spacing:1px; margin-bottom:6px;
            opacity:0; animation:fadeUp 1.4s var(--ease) 1s forwards;
        }

        /* Clip container — hides letters below the line */
        /* padding-bottom makes room for descenders like 'y', 'g', 'p' */
        .hero-title-mask { display:block; overflow:hidden; line-height:1.1; padding-bottom:0.22em; }
        .hero-title {
            display:block;
            font-family:var(--fh); font-size:clamp(52px,14vw,100px);
            font-weight:900; color:var(--cream);
            letter-spacing:-1px; line-height:1;
        }
        /* Each letter starts below the clip line */
        .hero-title .sl {
            display:inline-block;
            transform:translateY(110%);
            transition:transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hero-title .sl.in {
            transform:translateY(0);
        }
        .hero-script {
            font-family:var(--fs); font-size:clamp(.9rem,3vw,1.2rem);
            color:var(--amber-light); letter-spacing:4px; margin-top:4px;
            opacity:0; animation:fadeUp 1.4s var(--ease) 2s forwards;
        }

        .divider {
            display:flex; align-items:center; gap:12px; margin:20px auto;
            opacity:0; animation:fadeUp 1.4s var(--ease) 2.2s forwards;
        }
        .div-line { height:1px; background:linear-gradient(90deg,transparent,var(--amber)); width:0; animation:lineGrow 1s var(--ease) 2.8s forwards; }
        .div-line-r { background:linear-gradient(90deg,var(--amber),transparent); }
        .div-gem {
            width:8px; height:8px; background:var(--amber); transform:rotate(45deg);
            box-shadow:0 0 12px rgba(245,158,11,.7), 0 0 30px rgba(245,158,11,.3);
        }
        .hero-tagline {
            font-family:var(--fh); font-size:clamp(1rem,2.5vw,1.3rem);
            font-style:italic; color:var(--cream3); font-weight:400;
            opacity:0; animation:fadeUp 1.4s var(--ease) 2.4s forwards;
        }

        /* Pill row */
        .pills {
            display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
            margin-top:24px;
            opacity:0; animation:fadeUp 1.4s var(--ease) 2.7s forwards;
        }
        .pill {
            padding:6px 16px; border-radius:30px;
            border:1px solid rgba(245,158,11,.18);
            font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--cream4);
            backdrop-filter:blur(4px);
        }

        /* CTA */
        .cta-wrap {
            margin-top:28px;
            opacity:0; animation:fadeUp 1.4s var(--ease) 3s forwards;
            display:flex; flex-direction:column; align-items:center; gap:10px;
        }
        .cta-btn {
            position:relative; overflow:hidden;
            border:none; border-radius:60px; cursor:pointer;
            font-family:var(--fb); font-size:10px; font-weight:500;
            letter-spacing:5px; text-transform:uppercase;
            padding:18px 60px; color:#1a0800;
            background:linear-gradient(135deg, var(--amber-dark), var(--amber), var(--amber-light), var(--amber));
            background-size:200% 200%;
            animation:shimmer 3s ease infinite;
            box-shadow:0 0 30px rgba(245,158,11,.4), 0 8px 40px rgba(245,158,11,.2), inset 0 1px 0 rgba(255,255,255,.25);
            transition:transform .3s var(--ease), box-shadow .3s;
        }
        .cta-btn::before {
            content:''; position:absolute; inset:0;
            background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 50%);
            border-radius:60px;
        }
        .cta-btn:hover { transform:scale(1.06) translateY(-3px); box-shadow:0 0 60px rgba(245,158,11,.6),0 16px 60px rgba(245,158,11,.3); }
        .cta-hint { font-size:8px; letter-spacing:4px; color:rgba(254,249,240,.18); text-transform:uppercase; }

        /* Transition overlay */
        .t-overlay { position:fixed;inset:0;background:#0A0500;z-index:9997;opacity:0;pointer-events:none;transition:opacity 1s ease; }

        /* Responsive */
        @media(max-width:480px){ .pills { gap:6px; } .pill { font-size:8px; padding:5px 12px; } }
    </style>
</head>
<body>

    <div class="t-overlay" id="tOverlay"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Particles -->
    <div id="particles"></div>

    <!-- Ambient Orbs -->
    <div class="orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Video -->
    <video id="bgVid" class="bg-video" autoplay muted loop playsinline
           poster="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80&w=2000">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-hot-coffee-pouring-in-a-cup-2061-large.mp4" type="video/mp4">
    </video>

    <!-- Overlays -->
    <div class="overlay-gradient" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <!-- Steam -->
    <div class="steam-wrap" aria-hidden="true">
        <div class="steam"></div><div class="steam"></div>
        <div class="steam"></div><div class="steam"></div>
    </div>

    <!-- Header -->
    <header class="intro-header">
        <div id="clock" class="clock">--:--</div>
        <button id="skipBtn" class="skip-btn">Skip</button>
    </header>

    <!-- Hero -->
    <div class="hero">
        <span class="hero-eyebrow">Welcome to</span>
        <span class="hero-title-mask">
            <span class="hero-title">Arunodaya</span>
        </span>
        <span class="hero-script">Cafe &nbsp;&nbsp;·&nbsp;&nbsp; Est. Dawn</span>

        <div class="divider" aria-hidden="true">
            <div class="div-line"></div>
            <div class="div-gem"></div>
            <div class="div-line div-line-r"></div>
        </div>

        <p class="hero-tagline">Where every sip begins a story</p>

        <div class="pills">
            <span class="pill">South Indian Cuisine</span>
            <span class="pill">Fresh Brewed Coffee</span>
            <span class="pill">Est. Dawn Daily</span>
        </div>

        <div class="cta-wrap">
            <button id="ctaBtn" class="cta-btn">Experience Arunodaya</button>
            <span class="cta-hint">Tap to begin your journey</span>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        /* Particles */
        tsParticles.load("particles", {
            fpsLimit:60,
            particles:{
                number:{value:60,density:{enable:true,area:900}},
                color:{value:["#F59E0B","#FCD34D","#ffffff","#FBBF24"]},
                shape:{type:"circle"},
                opacity:{value:{min:.03,max:.25},animation:{enable:true,speed:.5,minimumValue:.03}},
                size:{value:{min:.4,max:2}},
                move:{enable:true,speed:.3,direction:"top",outModes:{default:"out"}},
            },
            detectRetina:true,
        });

        /* Clock */
        const clockEl = document.getElementById('clock');
        const tick = () => clockEl.textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        tick(); setInterval(tick,1000);

        /* Cursor glow */
        const glow = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', e => {
            glow.style.left = e.clientX + 'px';
            glow.style.top  = e.clientY + 'px';
        });

        /* Ripple */
        document.addEventListener('click', e => {
            const r = document.createElement('div');
            r.className = 'ripple-dot';
            r.style.cssText = `width:50px;height:50px;left:${e.clientX}px;top:${e.clientY}px;`;
            document.body.appendChild(r);
            r.addEventListener('animationend', () => r.remove());
        });

        /* Video fallback */
        document.addEventListener('click', () => {
            const v = document.getElementById('bgVid');
            if(v.paused) v.play().catch(()=>{});
        },{once:true});

        /* ── Staggered Letter Rise for "Arunodaya" ─────────── */
        const titleEl = document.querySelector('.hero-title');
        if (titleEl) {
            const word = titleEl.textContent.trim();

            // Wrap each letter in a span
            titleEl.textContent = '';
            const spans = [...word].map(ch => {
                const s = document.createElement('span');
                s.className = 'sl';
                s.textContent = ch === ' ' ? '\u00A0' : ch;
                titleEl.appendChild(s);
                return s;
            });

            // Trigger each letter with a stagger (starts at 1.1s)
            spans.forEach((s, i) => {
                setTimeout(() => s.classList.add('in'), 1100 + i * 70);
            });
        }

        /* CTA magnetic */
        const cta = document.getElementById('ctaBtn');
        cta.addEventListener('mousemove', e => {
            const rect = cta.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width/2;
            const y = e.clientY - rect.top - rect.height/2;
            cta.style.transform = `translate(${x*.28}px,${y*.28}px) scale(1.06)`;
        });
        cta.addEventListener('mouseleave', () => cta.style.transform = '');

        /* Transition */
        const overlay = document.getElementById('tOverlay');
        const go = () => {
            overlay.style.opacity = '1';
            overlay.style.pointerEvents = 'all';
            setTimeout(() => window.location.href = 'index.html', 1000);
        };
        cta.addEventListener('click', go);
        document.getElementById('skipBtn').addEventListener('click', go);
    });
    </script>
</body>
</html>
